<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>DFD - Sistem Segmentasi Pelanggan BandungJaket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #fff; padding: 30px; }
    .page { max-width: 1000px; margin: 0 auto 60px; padding: 20px; }
    .page-title { font-size: 16px; font-weight: 700; text-align: center; text-transform: uppercase; margin-bottom: 4px; }
    .page-subtitle { font-size: 12px; text-align: center; margin-bottom: 40px; font-style: italic; }
    svg text { font-family: Arial, sans-serif; }
    @media print { .page { page-break-after: always; } }
  </style>
</head>
<body>

<!-- DFD LEVEL 0 -->
<div class="page">
  <div class="page-title">DFD Level 0 (Context Diagram)</div>
  <div class="page-subtitle">Sistem Segmentasi Pelanggan BandungJaket</div>
  <svg width="800" height="400" viewBox="0 0 800 400">
    <defs><marker id="a0" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#000"/></marker></defs>

    <!-- ENTITIES -->
    <rect x="20" y="140" width="130" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="85" y="170" text-anchor="middle" font-size="13" font-weight="bold">USER</text>

    <rect x="640" y="20" width="130" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="705" y="50" text-anchor="middle" font-size="13" font-weight="bold">PENELITI</text>

    <rect x="640" y="290" width="130" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="705" y="312" text-anchor="middle" font-size="12" font-weight="bold">PLATFORM</text>
    <text x="705" y="328" text-anchor="middle" font-size="12" font-weight="bold">KAGGLE</text>

    <!-- PROCESS -->
    <circle cx="400" cy="190" r="85" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="400" y="178" text-anchor="middle" font-size="12" font-weight="bold">SISTEM</text>
    <text x="400" y="195" text-anchor="middle" font-size="12" font-weight="bold">SEGMENTASI</text>
    <text x="400" y="212" text-anchor="middle" font-size="12" font-weight="bold">PELANGGAN</text>

    <!-- ARROWS -->
    <line x1="150" y1="155" x2="313" y2="170" stroke="#000" stroke-width="1.5" marker-end="url(#a0)"/>
    <text x="210" y="148" font-size="10" font-style="italic">data RFM / file CSV</text>

    <line x1="313" y1="195" x2="150" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#a0)"/>
    <text x="185" y="205" font-size="10" font-style="italic">hasil segmen, visualisasi</text>

    <line x1="640" y1="58" x2="472" y2="138" stroke="#000" stroke-width="1.5" marker-end="url(#a0)"/>
    <text x="530" y="85" font-size="10" font-style="italic">model .pkl</text>

    <line x1="640" y1="302" x2="472" y2="242" stroke="#000" stroke-width="1.5" marker-end="url(#a0)"/>
    <text x="528" y="290" font-size="10" font-style="italic">dataset transaksi</text>
  </svg>
</div>

<!-- DFD LEVEL 1 -->
<div class="page">
  <div class="page-title">DFD Level 1</div>
  <div class="page-subtitle">Sistem Segmentasi Pelanggan BandungJaket</div>
  <svg width="960" height="820" viewBox="0 0 960 820">
    <defs><marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#000"/></marker></defs>

    <!-- ========== ENTITIES ========== -->
    <rect x="30" y="20" width="120" height="45" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="90" y="48" text-anchor="middle" font-size="12" font-weight="bold">PENELITI</text>

    <rect x="750" y="20" width="120" height="45" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="810" y="42" text-anchor="middle" font-size="11" font-weight="bold">PLATFORM</text>
    <text x="810" y="56" text-anchor="middle" font-size="11" font-weight="bold">KAGGLE</text>

    <rect x="30" y="580" width="120" height="45" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="90" y="608" text-anchor="middle" font-size="12" font-weight="bold">USER</text>

    <!-- ========== PROCESSES ========== -->
    <!-- 1.0 TRAINING MODEL -->
    <circle cx="440" cy="100" r="58" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="440" y="88" text-anchor="middle" font-size="10" font-weight="bold">1.0</text>
    <text x="440" y="104" text-anchor="middle" font-size="12" font-weight="bold">TRAINING</text>
    <text x="440" y="120" text-anchor="middle" font-size="12" font-weight="bold">MODEL</text>

    <!-- 2.0 BUILD DATA DASHBOARD -->
    <circle cx="700" cy="370" r="52" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="700" y="358" text-anchor="middle" font-size="10" font-weight="bold">2.0</text>
    <text x="700" y="374" text-anchor="middle" font-size="11" font-weight="bold">BUILD DATA</text>
    <text x="700" y="390" text-anchor="middle" font-size="11" font-weight="bold">DASHBOARD</text>

    <!-- 3.0 VISUALISASI DASHBOARD -->
    <circle cx="700" cy="600" r="52" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="700" y="588" text-anchor="middle" font-size="10" font-weight="bold">3.0</text>
    <text x="700" y="604" text-anchor="middle" font-size="11" font-weight="bold">VISUALISASI</text>
    <text x="700" y="620" text-anchor="middle" font-size="11" font-weight="bold">DASHBOARD</text>

    <!-- 4.0 KLASIFIKASI SATUAN -->
    <circle cx="320" cy="480" r="52" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="320" y="468" text-anchor="middle" font-size="10" font-weight="bold">4.0</text>
    <text x="320" y="484" text-anchor="middle" font-size="11" font-weight="bold">KLASIFIKASI</text>
    <text x="320" y="500" text-anchor="middle" font-size="11" font-weight="bold">SATUAN</text>

    <!-- 5.0 KLASIFIKASI BATCH -->
    <circle cx="320" cy="700" r="52" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="320" y="688" text-anchor="middle" font-size="10" font-weight="bold">5.0</text>
    <text x="320" y="704" text-anchor="middle" font-size="11" font-weight="bold">KLASIFIKASI</text>
    <text x="320" y="720" text-anchor="middle" font-size="11" font-weight="bold">BATCH</text>

    <!-- ========== DATA STORES ========== -->
    <!-- D1 MODEL STORE -->
    <line x1="160" y1="310" x2="430" y2="310" stroke="#000" stroke-width="2"/>
    <line x1="160" y1="340" x2="430" y2="340" stroke="#000" stroke-width="2"/>
    <line x1="160" y1="310" x2="160" y2="340" stroke="#000" stroke-width="2"/>
    <line x1="195" y1="310" x2="195" y2="340" stroke="#000" stroke-width="1"/>
    <text x="178" y="330" text-anchor="middle" font-size="10" font-weight="bold">D1</text>
    <text x="310" y="330" text-anchor="middle" font-size="11">MODEL STORE</text>

    <!-- D2 DATA STATIS JSON -->
    <line x1="560" y1="480" x2="830" y2="480" stroke="#000" stroke-width="2"/>
    <line x1="560" y1="510" x2="830" y2="510" stroke="#000" stroke-width="2"/>
    <line x1="560" y1="480" x2="560" y2="510" stroke="#000" stroke-width="2"/>
    <line x1="595" y1="480" x2="595" y2="510" stroke="#000" stroke-width="1"/>
    <text x="578" y="500" text-anchor="middle" font-size="10" font-weight="bold">D2</text>
    <text x="710" y="500" text-anchor="middle" font-size="11">DATA STATIS (JSON)</text>

    <!-- D3 HASIL SEGMENTASI -->
    <line x1="460" y1="230" x2="730" y2="230" stroke="#000" stroke-width="2"/>
    <line x1="460" y1="260" x2="730" y2="260" stroke="#000" stroke-width="2"/>
    <line x1="460" y1="230" x2="460" y2="260" stroke="#000" stroke-width="2"/>
    <line x1="495" y1="230" x2="495" y2="260" stroke="#000" stroke-width="1"/>
    <text x="478" y="250" text-anchor="middle" font-size="10" font-weight="bold">D3</text>
    <text x="610" y="250" text-anchor="middle" font-size="11">HASIL SEGMENTASI</text>

    <!-- ========== ARROWS ========== -->

    <!-- PENELITI → 1.0: trigger training -->
    <line x1="150" y1="42" x2="380" y2="85" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="230" y="50" font-size="10" font-style="italic">trigger training</text>

    <!-- KAGGLE → 1.0: dataset transaksi -->
    <line x1="750" y1="42" x2="500" y2="85" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="590" y="48" font-size="10" font-style="italic">dataset transaksi</text>

    <!-- 1.0 → D1: model .pkl -->
    <line x1="400" y1="148" x2="300" y2="308" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="320" y="228" font-size="10" font-style="italic">model .pkl</text>

    <!-- 1.0 → D3: hasil CSV -->
    <line x1="480" y1="148" x2="560" y2="228" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="540" y="180" font-size="10" font-style="italic">hasil CSV</text>

    <!-- D3 → 2.0: baca CSV -->
    <line x1="650" y1="262" x2="680" y2="316" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="688" y="290" font-size="10" font-style="italic">baca CSV</text>

    <!-- 2.0 → D2: data JSON -->
    <line x1="700" y1="424" x2="700" y2="478" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="716" y="455" font-size="10" font-style="italic">data JSON</text>

    <!-- D2 → 3.0: baca JSON -->
    <line x1="700" y1="512" x2="700" y2="546" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="716" y="534" font-size="10" font-style="italic">baca JSON</text>

    <!-- 3.0 → USER: chart, tabel, scatter plot -->
    <path d="M 648 610 Q 400 660 150 610" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="360" y="650" font-size="10" font-style="italic">chart, tabel, scatter plot</text>

    <!-- D1 → 4.0: load model -->
    <line x1="300" y1="342" x2="310" y2="426" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="325" y="388" font-size="10" font-style="italic">load model</text>

    <!-- D1 → 5.0: load model -->
    <line x1="260" y1="342" x2="290" y2="648" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="248" y="500" font-size="10" font-style="italic">load model</text>

    <!-- USER → 4.0: input data RFM -->
    <line x1="150" y1="590" x2="268" y2="500" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="170" y="535" font-size="10" font-style="italic">input data RFM</text>

    <!-- 4.0 → USER: hasil klasifikasi -->
    <line x1="268" y1="510" x2="150" y2="600" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="165" y="570" font-size="10" font-style="italic">hasil klasifikasi</text>

    <!-- USER → 5.0: upload file CSV -->
    <line x1="120" y1="627" x2="275" y2="678" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="150" y="670" font-size="10" font-style="italic">upload file CSV</text>

    <!-- 5.0 → USER: CSV hasil segmentasi -->
    <line x1="268" y1="718" x2="120" y2="625" stroke="#000" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="140" y="698" font-size="10" font-style="italic">CSV hasil segmentasi</text>
  </svg>
</div>

</body>
</html>
